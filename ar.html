<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoPromo AR Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      z-index: 100; pointer-events: none;
    }

    #status-bar {
      width: 100%; padding: 12px 16px;
      background: rgba(0,0,0,0.6);
      text-align: center; font-size: 14px;
      pointer-events: none;
    }

    #pin-popup {
      display: none;
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a2e; border: 2px solid #ff4b4b;
      border-radius: 16px; padding: 32px 24px;
      text-align: center; z-index: 200;
      pointer-events: all; width: 85%; max-width: 360px;
      box-shadow: 0 0 40px rgba(255,75,75,0.4);
    }

    #pin-popup h2 { font-size: 20px; margin-bottom: 8px; color: #ff4b4b; }
    #pin-popup p { font-size: 13px; color: #aaa; margin-bottom: 20px; }

    #pin-display {
      font-size: 48px; font-weight: bold; letter-spacing: 8px;
      color: #fff; background: #0f0f1a;
      padding: 16px 24px; border-radius: 12px;
      margin-bottom: 20px; font-family: monospace;
    }

    #copy-btn {
      width: 100%; padding: 14px;
      background: #ff4b4b; color: white;
      border: none; border-radius: 8px;
      font-size: 16px; cursor: pointer; margin-bottom: 10px;
    }

    #back-btn {
      width: 100%; padding: 12px;
      background: transparent; color: #aaa;
      border: 1px solid #444; border-radius: 8px;
      font-size: 14px; cursor: pointer;
    }

    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 300;
    }

    #loading h2 { font-size: 20px; margin-bottom: 12px; }
    #loading p { font-size: 13px; color: #888; text-align: center; padding: 0 32px; }

    .spinner {
      width: 48px; height: 48px; border: 4px solid #333;
      border-top-color: #ff4b4b; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-frame {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 240px; height: 240px;
      border: 3px solid #ff4b4b;
      border-radius: 12px; z-index: 99;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    #scan-frame::before, #scan-frame::after {
      content: ''; position: absolute;
      width: 24px; height: 24px;
      border-color: #ff4b4b; border-style: solid;
    }

    #error-box {
      display: none; position: fixed; bottom: 80px;
      left: 16px; right: 16px;
      background: #c0392b; border-radius: 10px;
      padding: 16px; text-align: center; z-index: 200;
      pointer-events: all;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div class="spinner"></div>
  <h2>🎯 GeoPromo AR</h2>
  <p>Loading AR scanner...<br/>Please allow camera access when prompted.</p>
</div>

<!-- Scan Frame -->
<div id="scan-frame"></div>

<!-- Status Bar -->
<div id="overlay">
  <div id="status-bar">📷 Point camera at the zone marker to reveal your PIN</div>
</div>

<!-- PIN Popup -->
<div id="pin-popup">
  <h2>🎉 PIN Revealed!</h2>
  <p>This is your one-time PIN. Use it immediately — it expires after one use.</p>
  <div id="pin-display">------</div>
  <button id="copy-btn" onclick="copyPin()">📋 Copy PIN & Go Back</button>
  <button id="back-btn" onclick="goBack()">← Back to App</button>
</div>

<!-- Error Box -->
<div id="error-box" id="error-box">
  <p id="error-msg">Something went wrong.</p>
</div>

<script>
  // Ambil zone_id dari URL
  const params = new URLSearchParams(window.location.search);
  const zoneId = params.get("zone") || "";
  const supabaseUrl = "https://hmdnfggthkaenwregdgp.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZG5mZ2d0aGthZW53cmVnZGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODA2MDIsImV4cCI6MjA5MzE1NjYwMn0.7s4fphmMPK4BEdoVlJnvwySi9cKiTGmX3EylQy35684";
  const appUrl = "https://pemburu-code.streamlit.app";

  let currentPin = null;
  let pinRevealed = false;

  // Fetch marker image URL dari Supabase
  async function getMarkerUrl() {
    const res = await fetch(`${supabaseUrl}/rest/v1/meja?id=eq.${encodeURIComponent(zoneId)}&select=ar_marker`, {
      headers: {
        "apikey": supabaseKey,
        "Authorization": `Bearer ${supabaseKey}`
      }
    });
    const data = await res.json();
    if (data && data[0] && data[0].ar_marker) {
      return data[0].ar_marker;
    }
    return null;
  }

  // Fetch PIN tersedia dari Supabase
  async function fetchAvailablePin() {
    const res = await fetch(`${supabaseUrl}/rest/v1/pins?zone_id=eq.${encodeURIComponent(zoneId)}&used=eq.false&limit=1&select=pin`, {
      headers: {
        "apikey": supabaseKey,
        "Authorization": `Bearer ${supabaseKey}`
      }
    });
    const data = await res.json();
    if (data && data[0]) return data[0].pin;
    return null;
  }

  function showPin(pin) {
    currentPin = pin;
    document.getElementById("pin-display").textContent = pin;
    document.getElementById("pin-popup").style.display = "block";
    document.getElementById("scan-frame").style.display = "none";
  }

  function copyPin() {
    if (currentPin) {
      navigator.clipboard.writeText(currentPin).catch(() => {});
      goBack();
    }
  }

  function goBack() {
    window.location.href = `${appUrl}?zone=${encodeURIComponent(zoneId)}`;
  }

  function showError(msg) {
    const box = document.getElementById("error-box");
    document.getElementById("error-msg").textContent = msg;
    box.style.display = "block";
    setTimeout(() => { box.style.display = "none"; }, 4000);
  }

  async function startAR(markerUrl) {
    document.getElementById("loading").style.display = "none";

    // Compile marker dari URL
    const { MindARThree } = window.MINDAR.IMAGE;
    const mindarThree = new MindARThree({
      container: document.body,
      imageTargetSrc: markerUrl,
      uiLoading: "no",
      uiError: "no",
      uiScanning: "no"
    });

    const { renderer, scene, camera } = mindarThree;

    const anchor = mindarThree.addAnchor(0);

    anchor.onTargetFound = async () => {
      if (pinRevealed) return;
      pinRevealed = true;
      document.getElementById("status-bar").textContent = "✅ Marker found! Fetching your PIN...";
      const pin = await fetchAvailablePin();
      if (pin) {
        showPin(pin);
      } else {
        showError("❌ No PINs available for this zone. Please contact admin.");
        pinRevealed = false;
      }
    };

    anchor.onTargetLost = () => {
      if (!pinRevealed) {
        document.getElementById("status-bar").textContent = "📷 Point camera at the zone marker to reveal your PIN";
      }
    };

    await mindarThree.start();

    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
    });
  }

  // Main
  (async () => {
    if (!zoneId) {
      document.getElementById("loading").innerHTML = "<h2>❌ No zone specified</h2><p>Please scan the QR code again.</p>";
      return;
    }

    const markerUrl = await getMarkerUrl();
    if (!markerUrl) {
      document.getElementById("loading").innerHTML = "<h2>⚠️ No AR marker found</h2><p>Admin hasn't uploaded an AR marker for this zone yet.</p>";
      return;
    }

    await startAR(markerUrl);
  })();
</script>
</body>
</html>
